<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeuroTyper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tailwind CSS CDN -->
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    body.light-mode {
      background-color: #f8fafc;
      color: #020617;
    }
    body.light-mode .bg-slate-950 {
      background-color: #ffffff !important;
    }
    body.light-mode .bg-slate-900\/60,
    body.light-mode .bg-slate-950\/60,
    body.light-mode .bg-slate-950\/70,
    body.light-mode .bg-slate-900\/80 {
      background-color: #e5e7eb !important;
    }
    body.light-mode .bg-slate-900 {
      background-color: #e5e7eb !important;
    }
    body.light-mode .text-slate-100,
    body.light-mode .text-slate-200,
    body.light-mode .text-slate-300,
    body.light-mode .text-slate-400,
    body.light-mode .text-slate-500 {
      color: #020617 !important;
    }
    body.light-mode .text-emerald-100 {
      color: #064e3b !important;
    }
    body.light-mode .text-red-100 {
      color: #7f1d1d !important;
    }
    body.light-mode .border-slate-800,
    body.light-mode .border-slate-700,
    body.light-mode .border-slate-600 {
      border-color: #cbd5f5 !important;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="root" class="min-h-screen flex items-center justify-center"></div>

  <!-- React + ReactDOM + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LECTURES_KEY = "neuroTyper_lectures";
    const RACES_KEY = "neuroTyper_races";

    function loadLectures() {
      try {
        const raw = localStorage.getItem(LECTURES_KEY);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (e) {
        console.error("Failed to load lectures", e);
        return [];
      }
    }

    function saveLectures(lectures) {
      localStorage.setItem(LECTURES_KEY, JSON.stringify(lectures));
    }

    function loadRaces() {
      try {
        const raw = localStorage.getItem(RACES_KEY);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (e) {
        console.error("Failed to load races", e);
        return [];
      }
    }

    function saveRaces(races) {
      localStorage.setItem(RACES_KEY, JSON.stringify(races));
    }

    function calculateAvgWPM(races, count = 10) {
      if (!races.length) return 40; // default starting WPM
      const recent = races.slice(-count);
      const sum = recent.reduce((acc, r) => acc + (r.wpm || 0), 0);
      return sum / recent.length || 40;
    }

    function normalizeChar(ch) {
      if (ch === "\u00A0") return " ";
      if (ch === "–" || ch === "—") return "-";
      return ch;
    }

    function App() {
      const [theme, setTheme] = useState("dark");
      const [lectures, setLectures] = useState([]);
      const [races, setRaces] = useState([]);
      const [view, setView] = useState("menu"); // menu | manage | race | results
      const [raceConfig, setRaceConfig] = useState(null);
      const [lastResult, setLastResult] = useState(null);

      useEffect(() => {
        if (theme === "dark") {
          document.body.classList.remove("light-mode");
        } else {
          document.body.classList.add("light-mode");
        }
      }, [theme]);

      useEffect(() => {
        setLectures(loadLectures());
        setRaces(loadRaces());
      }, []);

      useEffect(() => {
        saveLectures(lectures);
      }, [lectures]);

      useEffect(() => {
        saveRaces(races);
      }, [races]);

      const handleStartRace = (config) => {
        setRaceConfig(config);
        setView("race");
      };

      const handleRaceFinish = (result) => {
        const newRace = {
          id: Date.now(),
          timestamp: Date.now(),
          wpm: result.wpm,
          accuracy: result.accuracy,
          lectureIds: raceConfig.selectedLectureIds,
          mode: raceConfig.mode,
        };
        const updatedRaces = [...races, newRace];
        setRaces(updatedRaces);
        setLastResult({ ...result, mode: raceConfig.mode });
        setView("results");
      };

      const startAnotherRace = () => {
        if (!raceConfig || !raceConfig.selectedLectureIds || raceConfig.selectedLectureIds.length === 0) {
          setView("menu");
          return;
        }
        const selectedLectures = lectures.filter((l) =>
          raceConfig.selectedLectureIds.includes(l.id)
        );
        const allPassages = selectedLectures.flatMap((l) =>
          l.passages.map((p) => ({ text: p, lectureId: l.id }))
        );
        if (!allPassages.length) {
          setView("menu");
          return;
        }
        const randomIndex = Math.floor(Math.random() * allPassages.length);
        const chosen = allPassages[randomIndex];
        const avgWpm = calculateAvgWPM(races);
        const baseWpm = avgWpm;
        const bots = [
          { name: "Bot Glutamate", wpm: baseWpm * 0.8 },
          { name: "Bot Dopamine", wpm: baseWpm * 0.95 },
          { name: "Bot GABA", wpm: baseWpm * 1.05 },
          { name: "Bot Acetylcholine", wpm: baseWpm * 1.2 },
        ].map((bot) => ({
          ...bot,
          wpm: bot.wpm * (0.97 + Math.random() * 0.06),
        }));

        const newConfig = {
          mode: raceConfig.mode,
          selectedLectureIds: raceConfig.selectedLectureIds,
          passage: chosen.text,
          bots,
        };
        setRaceConfig(newConfig);
        setView("race");
      };

      return (
        <div className="w-full max-w-5xl mx-auto p-4">
          <header className="mb-6 flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold tracking-tight">NeuroTyper</h1>
              <p className="text-sm text-slate-400">
                A typing racer built from your NEU lecture passages 🧠⌨️
              </p>
            </div>
            <div className="flex items-center gap-2">
              <button
                className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700"
                onClick={() =>
                  setTheme((prev) => (prev === "dark" ? "light" : "dark"))
                }
              >
                {theme === "dark" ? "Light Mode" : "Dark Mode"}
              </button>
              <button
                className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm border border-slate-700"
                onClick={() => setView("menu")}
              >
                Main Menu
              </button>
            </div>
          </header>

          <main className="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 md:p-6 shadow-xl shadow-slate-900/40">
            {view === "menu" && (
              <MainMenu
                lectures={lectures}
                races={races}
                onStartRace={handleStartRace}
                onManage={() => setView("manage")}
              />
            )}
            {view === "manage" && (
              <LectureManager
                lectures={lectures}
                setLectures={setLectures}
              />
            )}
            {view === "race" && raceConfig && (
              <RaceScreen config={raceConfig} onFinish={handleRaceFinish} />
            )}
            {view === "results" && lastResult && (
              <ResultsScreen
                result={lastResult}
                onBackToMenu={() => setView("menu")}
                onRaceAgain={startAnotherRace}
              />
            )}
          </main>
        </div>
      );
    }

    function MainMenu({ lectures, races, onStartRace, onManage }) {
      const [mode, setMode] = useState("single"); // single | mixed
      const [selectedLectureIds, setSelectedLectureIds] = useState([]);
      const avgWpm = calculateAvgWPM(races);
      const recent = races.slice(-5).reverse();

      useEffect(() => {
        if (lectures.length && selectedLectureIds.length === 0) {
          // default select first lecture
          setSelectedLectureIds([lectures[0].id]);
        }
      }, [lectures]);

      const toggleLecture = (id) => {
        setSelectedLectureIds((prev) =>
          prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]
        );
      };

      const handleStart = () => {
        if (!selectedLectureIds.length) {
          alert("Please select at least one lecture.");
          return;
        }
        // Build passage pool
        const selectedLectures = lectures.filter((l) =>
          selectedLectureIds.includes(l.id)
        );
        const allPassages = selectedLectures.flatMap((l) =>
          l.passages.map((p) => ({ text: p, lectureId: l.id }))
        );
        if (!allPassages.length) {
          alert(
            "No passages found for the selected lecture(s). Please add some passages first."
          );
          return;
        }
        const randomIndex = Math.floor(Math.random() * allPassages.length);
        const chosen = allPassages[randomIndex];

        const baseWpm = avgWpm;
        const bots = [
          { name: "Bot Glutamate", wpm: baseWpm * 0.8 },
          { name: "Bot Dopamine", wpm: baseWpm * 0.95 },
          { name: "Bot GABA", wpm: baseWpm * 1.05 },
          { name: "Bot Acetylcholine", wpm: baseWpm * 1.2 },
        ].map((bot) => ({
          ...bot,
          wpm: bot.wpm * (0.97 + Math.random() * 0.06), // +/- ~3%
        }));

        onStartRace({
          mode,
          selectedLectureIds,
          passage: chosen.text,
          bots,
        });
      };

      return (
        <div className="grid md:grid-cols-[2fr,1.5fr] gap-6">
          <section className="space-y-4">
            <h2 className="text-xl font-semibold flex items-center gap-2">
              Start a Race
              <span className="text-xs font-normal px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-300 border border-emerald-500/30">
                Study + Speed
              </span>
            </h2>

            <div className="space-y-3">
              <div className="flex gap-3 text-sm">
                <button
                  className={`px-3 py-1.5 rounded-full border ${
                    mode === "single"
                      ? "bg-slate-100 text-slate-900 border-slate-100"
                      : "bg-slate-900 border-slate-600 text-slate-300"
                  }`}
                  onClick={() => setMode("single")}
                >
                  Single Lecture
                </button>
                <button
                  className={`px-3 py-1.5 rounded-full border ${
                    mode === "mixed"
                      ? "bg-slate-100 text-slate-900 border-slate-100"
                      : "bg-slate-900 border-slate-600 text-slate-300"
                  }`}
                  onClick={() => setMode("mixed")}
                >
                  Mixed Review
                </button>
              </div>

              <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-medium">
                    {mode === "single"
                      ? "Choose one NEU lecture"
                      : "Choose one or more NEU lectures"}
                  </span>
                  <div className="flex items-center gap-3 text-xs text-slate-500">
                    {mode === "mixed" && lectures.length > 0 && (
                      <button
                        type="button"
                        className="underline underline-offset-2 hover:text-slate-200"
                        onClick={() => {
                          if (selectedLectureIds.length === lectures.length) {
                            setSelectedLectureIds([]);
                          } else {
                            setSelectedLectureIds(lectures.map((l) => l.id));
                          }
                        }}
                      >
                        {selectedLectureIds.length === lectures.length
                          ? "Clear all"
                          : "Select all"}
                      </button>
                    )}
                    <span>
                      {lectures.length === 0
                        ? "No lectures yet — add some first"
                        : `${lectures.length} lecture(s) available`}
                    </span>
                  </div>
                </div>
                <div className="max-h-48 overflow-auto space-y-1 pr-1">
                  {lectures.length === 0 && (
                    <p className="text-xs text-slate-500">
                      Use &quot;Manage Lectures & Passages&quot; to add your first
                      lecture.
                    </p>
                  )}
                  {lectures.map((lec) => {
                    const selected = selectedLectureIds.includes(lec.id);
                    return (
                      <label
                        key={lec.id}
                        className={`flex items-center justify-between px-3 py-1.5 rounded-xl text-sm cursor-pointer ${
                          selected
                            ? "bg-sky-500/20 border border-sky-400/60"
                            : "bg-slate-900/60 border border-slate-800 hover:border-slate-600"
                        }`}
                      >
                        <div className="flex items-center gap-2">
                          <input
                            type={mode === "single" ? "radio" : "checkbox"}
                            name="lecture"
                            checked={selected}
                            onChange={() => {
                              if (mode === "single") {
                                setSelectedLectureIds([lec.id]);
                              } else {
                                toggleLecture(lec.id);
                              }
                            }}
                            className="accent-sky-400"
                          />
                          <span>{lec.name}</span>
                        </div>
                        <span className="text-xs text-slate-400">
                          {lec.passages.length} passage
                          {lec.passages.length === 1 ? "" : "s"}
                        </span>
                      </label>
                    );
                  })}
                </div>
              </div>

              <button
                onClick={handleStart}
                className="w-full mt-2 py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold text-sm shadow-lg shadow-emerald-500/30 disabled:opacity-50 disabled:cursor-not-allowed"
                disabled={lectures.length === 0}
              >
                Start Race 🚗
              </button>
            </div>

            <button
              onClick={onManage}
              className="mt-3 text-xs text-slate-400 hover:text-slate-200 underline underline-offset-4"
            >
              Manage lectures & passages
            </button>
          </section>

          <section className="space-y-4">
            <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3">
              <h3 className="text-sm font-semibold mb-2">Your Stats</h3>
              <p className="text-sm">
                Estimated average WPM:{" "}
                <span className="font-mono text-emerald-300">
                  {avgWpm.toFixed(1)}
                </span>
              </p>
              <p className="text-xs text-slate-500 mt-1">
                Based on your last {Math.min(races.length, 10)} race
                {races.length === 1 ? "" : "s"} (default 40 if no history).
              </p>
            </div>

            <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3">
              <h3 className="text-sm font-semibold mb-2">Recent Races</h3>
              {recent.length === 0 ? (
                <p className="text-xs text-slate-500">
                  No races yet. Start one to see your progress!
                </p>
              ) : (
                <ul className="space-y-1 text-xs">
                  {recent.map((r) => (
                    <li
                      key={r.id}
                      className="flex items-center justify-between"
                    >
                      <span className="font-mono">
                        {r.wpm.toFixed(1)} WPM · {r.accuracy.toFixed(0)}%
                      </span>
                      <span className="text-slate-500">
                        {r.mode === "single" ? "Single" : "Mixed"}
                      </span>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </section>
        </div>
      );
    }

    function LectureManager({ lectures, setLectures }) {
      const [newName, setNewName] = useState("");
      const [selectedId, setSelectedId] = useState(
        lectures[0]?.id ?? null
      );
      const [newPassage, setNewPassage] = useState("");

      const selectedLecture = lectures.find((l) => l.id === selectedId) || null;

      const addLecture = () => {
        const name = newName.trim();
        if (!name) return;
        const id = "lec_" + Date.now();
        const updated = [...lectures, { id, name, passages: [] }];
        setLectures(updated);
        setNewName("");
        setSelectedId(id);
      };

      const deleteLecture = (id) => {
        if (!confirm("Delete this lecture and all its passages?")) return;
        const updated = lectures.filter((l) => l.id !== id);
        setLectures(updated);
        if (selectedId === id) {
          setSelectedId(updated[0]?.id ?? null);
        }
      };

      const renameLecture = (id, newName) => {
        setLectures(
          lectures.map((l) =>
            l.id === id ? { ...l, name: newName } : l
          )
        );
      };

      const addPassage = () => {
        const text = newPassage.trim();
        if (!text || !selectedLecture) return;
        setLectures(
          lectures.map((l) =>
            l.id === selectedLecture.id
              ? { ...l, passages: [...l.passages, text] }
              : l
          )
        );
        setNewPassage("");
      };

      const updatePassage = (index, text) => {
        if (!selectedLecture) return;
        const updatedPassages = selectedLecture.passages.map((p, i) =>
          i === index ? text : p
        );
        setLectures(
          lectures.map((l) =>
            l.id === selectedLecture.id
              ? { ...l, passages: updatedPassages }
              : l
          )
        );
      };

      const deletePassage = (index) => {
        if (!selectedLecture) return;
        const updatedPassages = selectedLecture.passages.filter(
          (_, i) => i !== index
        );
        setLectures(
          lectures.map((l) =>
            l.id === selectedLecture.id
              ? { ...l, passages: updatedPassages }
              : l
          )
        );
      };

      return (
        <div className="grid md:grid-cols-[1.2fr,2fr] gap-6">
          <section className="space-y-4">
            <h2 className="text-xl font-semibold">Lectures</h2>

            <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3 space-y-3">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={newName}
                  onChange={(e) => setNewName(e.target.value)}
                  placeholder="Add new lecture (e.g. Lecture 13 – Basal Ganglia)"
                  className="flex-1 px-2 py-1.5 rounded-lg bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500"
                />
                <button
                  onClick={addLecture}
                  className="px-3 py-1.5 rounded-lg bg-sky-500 hover:bg-sky-400 text-slate-900 text-sm font-medium"
                >
                  Add
                </button>
              </div>

              <div className="max-h-64 overflow-auto space-y-1 pr-1">
                {lectures.length === 0 && (
                  <p className="text-xs text-slate-500">
                    No lectures yet. Add one to start organizing passages.
                  </p>
                )}
                {lectures.map((lec) => (
                  <div
                    key={lec.id}
                    className={`flex items-center justify-between px-3 py-1.5 rounded-xl text-sm ${
                      selectedId === lec.id
                        ? "bg-sky-500/20 border border-sky-400/60"
                        : "bg-slate-900/60 border border-slate-800"
                    }`}
                  >
                    <button
                      className="flex-1 text-left"
                      onClick={() => setSelectedId(lec.id)}
                    >
                      {lec.name}
                      <span className="block text-xs text-slate-500">
                        {lec.passages.length} passage
                        {lec.passages.length === 1 ? "" : "s"}
                      </span>
                    </button>
                    <button
                      className="ml-2 text-xs text-slate-400 hover:text-slate-200"
                      onClick={() => {
                        const newTitle = prompt(
                          "Rename lecture:",
                          lec.name
                        );
                        if (newTitle !== null && newTitle.trim()) {
                          renameLecture(lec.id, newTitle.trim());
                        }
                      }}
                    >
                      Rename
                    </button>
                    <button
                      className="ml-2 text-xs text-red-400 hover:text-red-300"
                      onClick={() => deleteLecture(lec.id)}
                    >
                      Delete
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="space-y-4">
            <h2 className="text-xl font-semibold">
              Passages {selectedLecture && `– ${selectedLecture.name}`}
            </h2>
            {!selectedLecture ? (
              <p className="text-sm text-slate-500">
                Select a lecture on the left to view or edit its passages.
              </p>
            ) : (
              <>
                <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3 space-y-3">
                  <label className="text-xs text-slate-400">
                    New passage for this lecture
                  </label>
                  <textarea
                    value={newPassage}
                    onChange={(e) => setNewPassage(e.target.value)}
                    rows={4}
                    placeholder="Paste or type a passage from your NEU lecture here..."
                    className="w-full px-2 py-1.5 rounded-lg bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500"
                  />
                  <div className="flex justify-between items-center">
                    <span className="text-xs text-slate-500">
                      This will be treated as one passage in the typing game.
                    </span>
                    <button
                      onClick={addPassage}
                      className="px-3 py-1.5 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-slate-900 text-sm font-medium"
                    >
                      Add Passage
                    </button>
                  </div>
                </div>

                <div className="bg-slate-950/60 border border-slate-800 rounded-2xl p-3 space-y-2 max-h-80 overflow-auto">
                  <h3 className="text-sm font-semibold mb-1">
                    Existing passages
                  </h3>
                  {selectedLecture.passages.length === 0 ? (
                    <p className="text-xs text-slate-500">
                      No passages yet. Add some above.
                    </p>
                  ) : (
                    selectedLecture.passages.map((p, idx) => (
                      <PassageEditor
                        key={idx}
                        index={idx}
                        text={p}
                        onChange={(text) => updatePassage(idx, text)}
                        onDelete={() => deletePassage(idx)}
                      />
                    ))
                  )}
                </div>
              </>
            )}
          </section>
        </div>
      );
    }

    function PassageEditor({ index, text, onChange, onDelete }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(text);

      useEffect(() => {
        setDraft(text);
      }, [text]);

      const save = () => {
        onChange(draft);
        setEditing(false);
      };

      return (
        <div className="border border-slate-800 rounded-xl p-2 text-xs bg-slate-900/80">
          <div className="flex justify-between items-center mb-1">
            <span className="text-slate-400">Passage {index + 1}</span>
            <div className="space-x-2">
              {editing ? (
                <button
                  className="text-emerald-400 hover:text-emerald-300"
                  onClick={save}
                >
                  Save
                </button>
              ) : (
                <button
                  className="text-sky-400 hover:text-sky-300"
                  onClick={() => setEditing(true)}
                >
                  Edit
                </button>
              )}
              <button
                className="text-red-400 hover:text-red-300"
                onClick={onDelete}
              >
                Delete
              </button>
            </div>
          </div>
          {editing ? (
            <textarea
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              rows={3}
              className="w-full bg-slate-950 border border-slate-700 rounded-lg px-2 py-1 text-[11px] focus:outline-none focus:ring-1 focus:ring-sky-500"
            />
          ) : (
            <p className="whitespace-pre-wrap text-slate-200">{text}</p>
          )}
        </div>
      );
    }

    
    function RaceScreen({ config, onFinish }) {
      const { passage, bots } = config;
      const [input, setInput] = useState("");
      const [startTime, setStartTime] = useState(null);
      const [now, setNow] = useState(null);
      const [finished, setFinished] = useState(false);

      // Refs for auto-scrolling like Monkeytype
      const passageContainerRef = useRef(null);
      const currentCharRef = useRef(null);

      const resetRace = () => {
        setInput("");
        setStartTime(null);
        setNow(null);
        setFinished(false);
      };

      // ESC to restart the current race
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Escape") {
            e.preventDefault();
            resetRace();
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, []);

      useEffect(() => {
        let interval = null;
        if (startTime && !finished) {
          interval = setInterval(() => {
            setNow(Date.now());
          }, 100);
        }
        return () => {
          if (interval) clearInterval(interval);
        };
      }, [startTime, finished]);

      const handleChange = (e) => {
        const value = e.target.value;
        if (!startTime && value.length > 0) {
          const t = Date.now();
          setStartTime(t);
          setNow(t);
        }
        if (finished) return;
        setInput(value);
      };

      const totalChars = passage.length;
      const typedChars = input.length;
      const correctChars = (() => {
        let count = 0;
        for (let i = 0; i < typedChars && i < totalChars; i++) {
          if (normalizeChar(input[i]) === normalizeChar(passage[i])) count++;
        }
        return count;
      })();

      const elapsedMs =
        startTime && now ? Math.max(now - startTime, 1) : 1;
      const elapsedMins = elapsedMs / 1000 / 60;
      const wpm = correctChars > 0 ? (correctChars / 5) / elapsedMins : 0;
      const accuracy =
        typedChars > 0 ? (correctChars / typedChars) * 100 : 100;

      useEffect(() => {
        if (!finished && typedChars >= totalChars && startTime) {
          setFinished(true);
          const finalWpm = wpm;
          const finalAcc = accuracy;
          setTimeout(() => {
            onFinish({
              wpm: finalWpm,
              accuracy: finalAcc,
              timeSec: elapsedMs / 1000,
            });
          }, 300);
        }
      }, [typedChars, totalChars, finished, startTime]);

      const progressFraction = totalChars
        ? Math.min(1, typedChars / totalChars)
        : 0;

      const elapsedSeconds = elapsedMs / 1000;
      const botStates = bots.map((bot) => {
        const charsPerSec = (bot.wpm * 5) / 60;
        const botChars = charsPerSec * elapsedSeconds;
        const frac = Math.min(1, botChars / totalChars);
        return { ...bot, fraction: frac };
      });

      // Auto-scroll to keep the current character in view
      useEffect(() => {
        if (currentCharRef.current && passageContainerRef.current) {
          currentCharRef.current.scrollIntoView({
            block: "center",
            inline: "nearest",
          });
        }
      }, [typedChars]);

      const renderPassage = () => {
        const chars = passage.split("");
        return (
          <div
            ref={passageContainerRef}
            className="font-mono text-3xl leading-relaxed max-h-56 overflow-auto pr-2"
          >
            {chars.map((ch, idx) => {
              const typed = input[idx];
              let className = "";
              if (typed === undefined) {
                className = "text-slate-500";
              } else if (normalizeChar(typed) === normalizeChar(ch)) {
                className = "bg-emerald-500/30 text-emerald-100";
              } else {
                className = "bg-red-500/30 text-red-100";
              }
              return (
                <span
                  key={idx}
                  className={className}
                  ref={idx === typedChars ? currentCharRef : null}
                >
                  {ch}
                </span>
              );
            })}
          </div>
        );
      };

      return (
        <div className="space-y-4">
          <h2 className="text-xl font-semibold">Race!</h2>

          <div className="grid md:grid-cols-[2fr,1.1fr] gap-4">
            <div className="space-y-3">
              <div className="bg-slate-950/70 border border-slate-800 rounded-2xl p-3">
                <h3 className="text-xs uppercase tracking-wide text-slate-500 mb-1">
                  Passage
                </h3>
                <div className="bg-slate-900/80 rounded-xl p-3">
                  {renderPassage()}
                </div>
              </div>

              <div className="bg-slate-950/70 border border-slate-800 rounded-2xl p-3">
                <h3 className="text-xs uppercase tracking-wide text-slate-500 mb-1">
                  Your input
                </h3>
                <textarea
                  value={input}
                  onChange={handleChange}
                  rows={4}
                  className="w-full bg-slate-900 rounded-xl border border-slate-700 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-emerald-500"
                  placeholder="Start typing the passage above..."
                />
              </div>
            </div>

            <div className="space-y-3">
              <div className="bg-slate-950/70 border border-slate-800 rounded-2xl p-3">
                <h3 className="text-xs uppercase tracking-wide text-slate-500 mb-1">
                  Live Stats
                </h3>
                <div className="flex justify-between text-sm mb-1">
                  <div>
                    <div className="text-slate-400 text-xs">WPM</div>
                    <div className="text-lg font-mono text-emerald-300">
                      {wpm.toFixed(1)}
                    </div>
                  </div>
                  <div>
                    <div className="text-slate-400 text-xs">Accuracy</div>
                    <div className="text-lg font-mono text-sky-300">
                      {accuracy.toFixed(0)}%
                    </div>
                  </div>
                  <div>
                    <div className="text-slate-400 text-xs">Progress</div>
                    <div className="text-lg font-mono text-slate-200">
                      {(progressFraction * 100).toFixed(0)}%
                    </div>
                  </div>
                </div>
                <div className="text-xs text-slate-500">
                  Time: {(elapsedMs / 1000).toFixed(1)}s ·{" "}
                  {typedChars}/{totalChars} chars
                </div>
              </div>

              <div className="bg-slate-950/70 border border-slate-800 rounded-2xl p-3 space-y-2">
                <h3 className="text-xs uppercase tracking-wide text-slate-500 mb-1">
                  Race Track
                </h3>

                <div className="space-y-1">
                  <TrackRow
                    label="You"
                    fraction={progressFraction}
                    color="bg-emerald-400"
                  />
                  {botStates.map((bot) => (
                    <TrackRow
                      key={bot.name}
                      label={bot.name}
                      fraction={bot.fraction}
                      color="bg-sky-400"
                    />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

function TrackRow({ label, fraction, color }) {
      return (
        <div className="text-xs">
          <div className="flex justify-between mb-0.5">
            <span className="text-slate-300">{label}</span>
            <span className="text-slate-500">
              {(fraction * 100).toFixed(0)}%
            </span>
          </div>
          <div className="h-2 rounded-full bg-slate-800 overflow-hidden">
            <div
              className={`h-full ${color}`}
              style={{ width: `${fraction * 100}%` }}
            />
          </div>
        </div>
      );
    }

    function ResultsScreen({ result, onBackToMenu, onRaceAgain }) {
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            if (onRaceAgain) {
              onRaceAgain();
            }
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [onRaceAgain]);

      return (
        <div className="space-y-4">
          <h2 className="text-xl font-semibold">Race Results</h2>
          <div className="bg-slate-950/70 border border-slate-800 rounded-2xl p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div className="space-y-1">
              <p className="text-sm text-slate-400">
                Mode:{" "}
                <span className="font-mono text-slate-100">
                  {result.mode === "single" ? "Single lecture" : "Mixed review"}
                </span>
              </p>
              <p className="text-sm">
                WPM:{" "}
                <span className="font-mono text-emerald-300 text-lg">
                  {result.wpm.toFixed(1)}
                </span>
              </p>
              <p className="text-sm">
                Accuracy:{" "}
                <span className="font-mono text-sky-300 text-lg">
                  {result.accuracy.toFixed(0)}%
                </span>
              </p>
              <p className="text-xs text-slate-500">
                Time: {result.timeSec.toFixed(1)} seconds
              </p>
            </div>
            <div className="flex flex-col gap-2 md:items-end">
              <button
                onClick={onRaceAgain}
                className="self-start md:self-auto px-4 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold text-sm"
              >
                Race Again ↵
              </button>
              <button
                onClick={onBackToMenu}
                className="self-start md:self-auto px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-100 font-semibold text-sm border border-slate-700"
              >
                Back to Menu
              </button>
            </div>
          </div>
          <p className="text-xs text-slate-500">
            Tip: You can tweak your lecture passages in the &quot;Manage lectures &amp; passages&quot; screen
            and then race again for targeted NEU review.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
