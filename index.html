<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeuroTyper — Race Your Way Through Neuroscience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NeuroTyper: A typing race game built from your neuroscience lecture passages. Study smarter, type faster." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'float': 'float 3s ease-in-out infinite',
            'confetti-fall': 'confettiFall 1.5s ease-out forwards',
            'count-pop': 'countPop 0.8s ease-out',
            'shake': 'shake 0.3s ease-in-out',
            'progress-fill': 'progressFill 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseGlow: { '0%, 100%': { boxShadow: '0 0 20px rgba(16,185,129,0.2)' }, '50%': { boxShadow: '0 0 40px rgba(16,185,129,0.4)' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            confettiFall: { '0%': { transform: 'translateY(-100px) rotate(0deg)', opacity: '1' }, '100%': { transform: 'translateY(600px) rotate(720deg)', opacity: '0' } },
            countPop: { '0%': { transform: 'scale(0.5)', opacity: '0' }, '50%': { transform: 'scale(1.3)' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-4px)' }, '75%': { transform: 'translateX(4px)' } },
            progressFill: { '0%': { width: '0%' }, '100%': { width: '100%' } },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { transition: background-color 0.3s ease, color 0.3s ease; }
    body.light-mode { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%); color: #0f172a; }
    body.light-mode .glass-card { background: rgba(255,255,255,0.7) !important; border-color: rgba(148,163,184,0.3) !important; }
    body.light-mode .glass-card-inner { background: rgba(255,255,255,0.5) !important; }
    body.light-mode .text-slate-100, body.light-mode .text-slate-200, body.light-mode .text-slate-300 { color: #1e293b !important; }
    body.light-mode .text-slate-400, body.light-mode .text-slate-500 { color: #475569 !important; }
    body.light-mode .bg-slate-900 { background-color: #f1f5f9 !important; }
    body.light-mode .bg-slate-800 { background-color: #e2e8f0 !important; }
    body.light-mode .border-slate-700, body.light-mode .border-slate-800 { border-color: #cbd5e1 !important; }
    body.light-mode input, body.light-mode textarea, body.light-mode select { background-color: #fff !important; color: #0f172a !important; border-color: #cbd5e1 !important; }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(148,163,184,0.1); }
    .glass-card-inner { background: rgba(15,23,42,0.4); }
    .gradient-text { background: linear-gradient(135deg, #10b981 0%, #06b6d4 50%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gradient-border { border-image: linear-gradient(135deg, #10b981, #06b6d4, #8b5cf6) 1; }
    .neon-glow { text-shadow: 0 0 10px rgba(16,185,129,0.5), 0 0 20px rgba(16,185,129,0.3); }
    .passage-char { transition: background-color 0.1s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.5); }
    .track-car { transition: left 0.15s linear; }
    @keyframes neuronPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .neuron-bg { position: fixed; pointer-events: none; z-index: 0; }
    .confetti-piece { position: fixed; z-index: 9999; pointer-events: none; }
    .achievement-toast { animation: slideUp 0.4s ease-out, fadeIn 0.4s ease-out; }
    .combo-flash { animation: countPop 0.3s ease-out; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

    /* ═══════════════════════ CONSTANTS & STORAGE ═══════════════════════ */
    const LECTURES_KEY = "neuroTyper_lectures";
    const RACES_KEY = "neuroTyper_races";
    const SETTINGS_KEY = "neuroTyper_settings";
    const ACHIEVEMENTS_KEY = "neuroTyper_achievements";
    const STREAKS_KEY = "neuroTyper_streaks";

    const DEFAULT_SETTINGS = { theme: "dark", difficulty: "medium", soundEnabled: true, showCombo: true };

    const DIFFICULTY_CONFIG = {
      easy: { label: "Easy", passageMaxLen: 150, botMultiplier: 0.75, color: "emerald" },
      medium: { label: "Medium", passageMaxLen: 400, botMultiplier: 1.0, color: "sky" },
      hard: { label: "Hard", passageMaxLen: Infinity, botMultiplier: 1.25, color: "purple" },
    };

    const ACHIEVEMENTS_LIST = [
      { id: "first_race", name: "First Steps", desc: "Complete your first race", icon: "🏁", check: (s) => s.totalRaces >= 1 },
      { id: "speed_demon", name: "Speed Demon", desc: "Reach 60+ WPM", icon: "⚡", check: (s) => s.bestWpm >= 60 },
      { id: "perfectionist", name: "Perfectionist", desc: "Get 100% accuracy", icon: "🎯", check: (s) => s.perfectRaces >= 1 },
      { id: "marathon", name: "Marathon Runner", desc: "Complete 10 races", icon: "🏃", check: (s) => s.totalRaces >= 10 },
      { id: "streak_3", name: "On Fire", desc: "3-day practice streak", icon: "🔥", check: (s) => s.streak >= 3 },
      { id: "streak_7", name: "Unstoppable", desc: "7-day practice streak", icon: "💪", check: (s) => s.streak >= 7 },
      { id: "wpm_80", name: "Lightning Fingers", desc: "Reach 80+ WPM", icon: "🌩️", check: (s) => s.bestWpm >= 80 },
      { id: "wpm_100", name: "Transcendent", desc: "Reach 100+ WPM", icon: "🧬", check: (s) => s.bestWpm >= 100 },
      { id: "races_25", name: "Dedicated Scholar", desc: "Complete 25 races", icon: "📚", check: (s) => s.totalRaces >= 25 },
      { id: "races_50", name: "Neuroscience Master", desc: "Complete 50 races", icon: "🧠", check: (s) => s.totalRaces >= 50 },
      { id: "combo_20", name: "Combo King", desc: "20+ char combo streak", icon: "👑", check: (s) => s.bestCombo >= 20 },
      { id: "combo_50", name: "Untouchable", desc: "50+ char combo streak", icon: "💎", check: (s) => s.bestCombo >= 50 },
    ];

    const BOT_NAMES = ["Glutamate", "Dopamine", "GABA", "Acetylcholine"];
    const BOT_COLORS = ["bg-rose-400", "bg-amber-400", "bg-violet-400", "bg-cyan-400"];
    const BOT_EMOJIS = ["🔴", "🟡", "🟣", "🔵"];

    /* ═══════════════════════ UTILITY FUNCTIONS ═══════════════════════ */
    function load(key, fallback) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
      catch { return fallback; }
    }
    function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    function calculateAvgWPM(races, count = 10) {
      if (!races.length) return 40;
      const recent = races.slice(-count);
      return recent.reduce((a, r) => a + (r.wpm || 0), 0) / recent.length || 40;
    }

    function normalizeChar(ch) {
      if (ch === "\u00A0") return " ";
      if (ch === "\u2013" || ch === "\u2014") return "-";
      if (ch === "\u2018" || ch === "\u2019") return "'";
      if (ch === "\u201C" || ch === "\u201D") return '"';
      return ch;
    }

    function getStreak(races) {
      if (!races.length) return 0;
      const days = new Set(races.map(r => new Date(r.timestamp).toDateString()));
      let streak = 0;
      let d = new Date();
      while (true) {
        if (days.has(d.toDateString())) { streak++; d.setDate(d.getDate() - 1); }
        else if (streak === 0) { d.setDate(d.getDate() - 1); if (!days.has(d.toDateString())) break; }
        else break;
      }
      return streak;
    }

    function getStats(races) {
      const totalRaces = races.length;
      const bestWpm = races.reduce((m, r) => Math.max(m, r.wpm || 0), 0);
      const perfectRaces = races.filter(r => r.accuracy >= 99.5).length;
      const streak = getStreak(races);
      const bestCombo = races.reduce((m, r) => Math.max(m, r.bestCombo || 0), 0);
      return { totalRaces, bestWpm, perfectRaces, streak, bestCombo };
    }

    function truncatePassage(text, maxLen) {
      if (text.length <= maxLen) return text;
      const cut = text.substring(0, maxLen);
      const lastSpace = cut.lastIndexOf(" ");
      return lastSpace > maxLen * 0.7 ? cut.substring(0, lastSpace) : cut;
    }

    /* ═══════════════════════ SOUND EFFECTS ═══════════════════════ */
    const AudioCtx = typeof AudioContext !== "undefined" ? AudioContext : (typeof webkitAudioContext !== "undefined" ? webkitAudioContext : null);
    let audioCtx = null;
    function getAudioCtx() { if (!audioCtx && AudioCtx) audioCtx = new AudioCtx(); return audioCtx; }

    function playSound(type) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (type === "keystroke") { osc.frequency.value = 800 + Math.random() * 200; gain.gain.value = 0.03; osc.type = "sine"; osc.start(); osc.stop(ctx.currentTime + 0.02); }
        else if (type === "error") { osc.frequency.value = 200; gain.gain.value = 0.06; osc.type = "square"; osc.start(); osc.stop(ctx.currentTime + 0.08); }
        else if (type === "countdown") { osc.frequency.value = 440; gain.gain.value = 0.1; osc.type = "sine"; osc.start(); osc.stop(ctx.currentTime + 0.15); }
        else if (type === "go") { osc.frequency.value = 880; gain.gain.value = 0.12; osc.type = "sine"; osc.start(); osc.stop(ctx.currentTime + 0.3); }
        else if (type === "finish") {
          [523, 659, 784, 1047].forEach((f, i) => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = f; g.gain.value = 0.08; o.type = "sine";
            o.start(ctx.currentTime + i * 0.12); o.stop(ctx.currentTime + i * 0.12 + 0.2);
          });
        }
        else if (type === "achievement") {
          [660, 880, 1100, 1320].forEach((f, i) => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = f; g.gain.value = 0.06; o.type = "triangle";
            o.start(ctx.currentTime + i * 0.08); o.stop(ctx.currentTime + i * 0.08 + 0.15);
          });
        }
        else if (type === "combo") { osc.frequency.value = 600; gain.gain.value = 0.04; osc.type = "triangle"; osc.start(); osc.stop(ctx.currentTime + 0.05); }
      } catch(e) {}
    }

    /* ═══════════════════════ CONFETTI ═══════════════════════ */
    function launchConfetti() {
      const colors = ["#10b981", "#06b6d4", "#8b5cf6", "#f59e0b", "#ef4444", "#ec4899"];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement("div");
        el.className = "confetti-piece";
        el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation:confettiFall ${1+Math.random()*2}s ease-out ${Math.random()*0.5}s forwards;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }
    }

    /* ═══════════════════════ CONTEXT ═══════════════════════ */
    const AppContext = createContext();

    /* ═══════════════════════ MAIN APP ═══════════════════════ */
    function App() {
      const [settings, setSettings] = useState(() => load(SETTINGS_KEY, DEFAULT_SETTINGS));
      const [lectures, setLectures] = useState(() => load(LECTURES_KEY, []));
      const [races, setRaces] = useState(() => load(RACES_KEY, []));
      const [achievements, setAchievements] = useState(() => load(ACHIEVEMENTS_KEY, []));
      const [view, setView] = useState("menu");
      const [raceConfig, setRaceConfig] = useState(null);
      const [lastResult, setLastResult] = useState(null);
      const [toasts, setToasts] = useState([]);

      useEffect(() => { save(SETTINGS_KEY, settings); }, [settings]);
      useEffect(() => { save(LECTURES_KEY, lectures); }, [lectures]);
      useEffect(() => { save(RACES_KEY, races); }, [races]);
      useEffect(() => { save(ACHIEVEMENTS_KEY, achievements); }, [achievements]);

      useEffect(() => {
        if (settings.theme === "dark") document.body.classList.remove("light-mode");
        else document.body.classList.add("light-mode");
      }, [settings.theme]);

      const addToast = useCallback((msg, icon) => {
        const id = Date.now();
        setToasts(p => [...p, { id, msg, icon }]);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
      }, []);

      const checkAchievements = useCallback((newRaces, bestCombo = 0) => {
        const stats = getStats(newRaces);
        stats.bestCombo = Math.max(stats.bestCombo, bestCombo);
        ACHIEVEMENTS_LIST.forEach(a => {
          if (!achievements.includes(a.id) && a.check(stats)) {
            setAchievements(prev => { const n = [...prev, a.id]; save(ACHIEVEMENTS_KEY, n); return n; });
            addToast(`Achievement: ${a.name}!`, a.icon);
            if (settings.soundEnabled) playSound("achievement");
          }
        });
      }, [achievements, settings.soundEnabled, addToast]);

      const handleStartRace = (config) => { setRaceConfig(config); setView("race"); };

      const handleRaceFinish = (result) => {
        const newRace = {
          id: Date.now(), timestamp: Date.now(), wpm: result.wpm,
          accuracy: result.accuracy, lectureIds: raceConfig.selectedLectureIds,
          mode: raceConfig.mode, difficulty: settings.difficulty, bestCombo: result.bestCombo || 0,
        };
        const updatedRaces = [...races, newRace];
        setRaces(updatedRaces);
        setLastResult({ ...result, mode: raceConfig.mode });
        setView("results");
        checkAchievements(updatedRaces, result.bestCombo);
        if (settings.soundEnabled) playSound("finish");
        launchConfetti();
      };

      const startAnotherRace = () => {
        if (!raceConfig?.selectedLectureIds?.length) { setView("menu"); return; }
        const sel = lectures.filter(l => raceConfig.selectedLectureIds.includes(l.id));
        const allP = sel.flatMap(l => l.passages.map(p => ({ text: p, lectureId: l.id })));
        if (!allP.length) { setView("menu"); return; }
        const chosen = allP[Math.floor(Math.random() * allP.length)];
        const diff = DIFFICULTY_CONFIG[settings.difficulty];
        const passageText = truncatePassage(chosen.text, diff.passageMaxLen);
        const avgWpm = calculateAvgWPM(races);
        const bots = BOT_NAMES.map((name, i) => {
          const mult = [0.8, 0.95, 1.05, 1.2][i] * diff.botMultiplier;
          return { name, wpm: avgWpm * mult * (0.97 + Math.random() * 0.06), color: BOT_COLORS[i], emoji: BOT_EMOJIS[i] };
        });
        setRaceConfig({ mode: raceConfig.mode, selectedLectureIds: raceConfig.selectedLectureIds, passage: passageText, bots });
        setView("race");
      };

      const updateSetting = (key, val) => setSettings(p => ({ ...p, [key]: val }));

      const ctx = { settings, updateSetting, lectures, setLectures, races, setRaces, achievements, addToast };

      return (
        <AppContext.Provider value={ctx}>
          <div className="relative min-h-screen flex flex-col">
            {/* Background decoration */}
            <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
              <div className="absolute top-0 left-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl"></div>
              <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
              <div className="absolute top-1/2 left-1/2 w-64 h-64 bg-purple-500/5 rounded-full blur-3xl"></div>
            </div>

            <div className="relative z-10 w-full max-w-6xl mx-auto p-4 md:p-6 flex-1">
              <Header view={view} setView={setView} />

              <main className="glass-card rounded-3xl p-5 md:p-8 shadow-2xl shadow-black/20 animate-fade-in">
                {view === "menu" && <MainMenu lectures={lectures} races={races} onStartRace={handleStartRace} onManage={() => setView("manage")} onStats={() => setView("stats")} onAchievements={() => setView("achievements")} />}
                {view === "manage" && <LectureManager />}
                {view === "race" && raceConfig && <RaceScreen config={raceConfig} onFinish={handleRaceFinish} />}
                {view === "results" && lastResult && <ResultsScreen result={lastResult} onBackToMenu={() => setView("menu")} onRaceAgain={startAnotherRace} races={races} />}
                {view === "stats" && <StatsScreen />}
                {view === "achievements" && <AchievementsScreen />}
                {view === "settings" && <SettingsScreen />}
              </main>

              <footer className="text-center text-xs text-slate-500 mt-6 mb-4">
                NeuroTyper — Study smarter, type faster. All data stored locally in your browser.
              </footer>
            </div>

            {/* Toast notifications */}
            <div className="fixed top-4 right-4 z-50 space-y-2">
              {toasts.map(t => (
                <div key={t.id} className="achievement-toast glass-card rounded-xl px-4 py-3 flex items-center gap-3 shadow-xl min-w-[250px]">
                  <span className="text-2xl">{t.icon}</span>
                  <span className="text-sm font-medium text-emerald-300">{t.msg}</span>
                </div>
              ))}
            </div>
          </div>
        </AppContext.Provider>
      );
    }

    /* ═══════════════════════ HEADER ═══════════════════════ */
    function Header({ view, setView }) {
      const { settings, updateSetting } = useContext(AppContext);
      return (
        <header className="mb-6 flex items-center justify-between animate-slide-up">
          <div className="flex items-center gap-3">
            <div className="text-4xl animate-float">🧠</div>
            <div>
              <h1 className="text-3xl md:text-4xl font-black tracking-tight">
                <span className="gradient-text">NeuroTyper</span>
              </h1>
              <p className="text-xs md:text-sm text-slate-400 font-light">
                Race through your neuroscience lectures
              </p>
            </div>
          </div>
          <nav className="flex items-center gap-1.5 md:gap-2">
            <button onClick={() => updateSetting("theme", settings.theme === "dark" ? "light" : "dark")}
              className="p-2 rounded-xl glass-card hover:bg-slate-800/80 transition-all text-sm" title="Toggle theme">
              {settings.theme === "dark" ? "☀️" : "🌙"}
            </button>
            <button onClick={() => updateSetting("soundEnabled", !settings.soundEnabled)}
              className="p-2 rounded-xl glass-card hover:bg-slate-800/80 transition-all text-sm" title="Toggle sound">
              {settings.soundEnabled ? "🔊" : "🔇"}
            </button>
            <button onClick={() => setView("settings")}
              className="p-2 rounded-xl glass-card hover:bg-slate-800/80 transition-all text-sm" title="Settings">⚙️</button>
            {view !== "menu" && (
              <button onClick={() => setView("menu")}
                className="px-3 py-2 rounded-xl glass-card hover:bg-slate-800/80 transition-all text-sm font-medium">
                Menu
              </button>
            )}
          </nav>
        </header>
      );
    }

    /* ═══════════════════════ MAIN MENU ═══════════════════════ */
    function MainMenu({ lectures, races, onStartRace, onManage, onStats, onAchievements }) {
      const { settings, achievements } = useContext(AppContext);
      const [mode, setMode] = useState("single");
      const [selectedIds, setSelectedIds] = useState([]);
      const avgWpm = calculateAvgWPM(races);
      const streak = getStreak(races);
      const recent = races.slice(-5).reverse();

      useEffect(() => {
        if (lectures.length && !selectedIds.length) setSelectedIds([lectures[0].id]);
      }, [lectures]);

      const toggle = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const handleStart = () => {
        if (!selectedIds.length) return alert("Please select at least one lecture.");
        const sel = lectures.filter(l => selectedIds.includes(l.id));
        const allP = sel.flatMap(l => l.passages.map(p => ({ text: p, lectureId: l.id })));
        if (!allP.length) return alert("No passages found. Add some first.");
        const chosen = allP[Math.floor(Math.random() * allP.length)];
        const diff = DIFFICULTY_CONFIG[settings.difficulty];
        const passageText = truncatePassage(chosen.text, diff.passageMaxLen);
        const bots = BOT_NAMES.map((name, i) => {
          const mult = [0.8, 0.95, 1.05, 1.2][i] * diff.botMultiplier;
          return { name, wpm: avgWpm * mult * (0.97 + Math.random() * 0.06), color: BOT_COLORS[i], emoji: BOT_EMOJIS[i] };
        });
        onStartRace({ mode, selectedLectureIds: selectedIds, passage: passageText, bots });
      };

      const unlockedCount = achievements.length;

      return (
        <div className="space-y-6 animate-fade-in">

    /* ═══════════════════════ LECTURE MANAGER ═══════════════════════ */
    function LectureManager() {
      const { lectures, setLectures } = useContext(AppContext);
      const [newName, setNewName] = useState("");
      const [selectedId, setSelectedId] = useState(lectures[0]?.id ?? null);
      const [newPassage, setNewPassage] = useState("");
      const selectedLecture = lectures.find(l => l.id === selectedId) || null;

      const addLecture = () => {
        const name = newName.trim();
        if (!name) return;
        const id = "lec_" + Date.now();
        setLectures([...lectures, { id, name, passages: [] }]);
        setNewName("");
        setSelectedId(id);
      };

      const deleteLecture = (id) => {
        if (!confirm("Delete this lecture and all its passages?")) return;
        const updated = lectures.filter(l => l.id !== id);
        setLectures(updated);
        if (selectedId === id) setSelectedId(updated[0]?.id ?? null);
      };

      const renameLecture = (id) => {
        const lec = lectures.find(l => l.id === id);
        const newTitle = prompt("Rename lecture:", lec?.name);
        if (newTitle?.trim()) setLectures(lectures.map(l => l.id === id ? { ...l, name: newTitle.trim() } : l));
      };

      const addPassage = () => {
        const text = newPassage.trim();
        if (!text || !selectedLecture) return;
        setLectures(lectures.map(l => l.id === selectedLecture.id ? { ...l, passages: [...l.passages, text] } : l));
        setNewPassage("");
      };

      const updatePassage = (index, text) => {
        if (!selectedLecture) return;
        setLectures(lectures.map(l => l.id === selectedLecture.id
          ? { ...l, passages: l.passages.map((p, i) => i === index ? text : p) } : l));
      };

      const deletePassage = (index) => {
        if (!selectedLecture) return;
        setLectures(lectures.map(l => l.id === selectedLecture.id
          ? { ...l, passages: l.passages.filter((_, i) => i !== index) } : l));
      };

      return (
        <div className="animate-fade-in">
          <h2 className="text-2xl font-bold mb-4 flex items-center gap-2">📝 Manage Lectures</h2>
          <div className="grid md:grid-cols-[1.2fr,2fr] gap-6">
            <section className="space-y-4">
              <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 space-y-3">
                <div className="flex gap-2">
                  <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addLecture()}
                    placeholder="New lecture name..."
                    className="flex-1 px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50" />
                  <button onClick={addLecture}
                    className="px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-900 text-sm font-bold hover:from-emerald-400 hover:to-cyan-400 transition-all">
                    Add
                  </button>
                </div>
                <div className="max-h-72 overflow-auto space-y-1.5">
                  {lectures.length === 0 && <p className="text-xs text-slate-500 text-center py-4">No lectures yet.</p>}
                  {lectures.map(lec => (
                    <div key={lec.id}
                      className={`flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all cursor-pointer ${selectedId === lec.id
                        ? "bg-sky-500/20 border border-sky-400/50" : "glass-card-inner border border-transparent hover:border-slate-700"}`}
                      onClick={() => setSelectedId(lec.id)}>
                      <div>
                        <div className="font-medium">{lec.name}</div>
                        <div className="text-[10px] text-slate-400">{lec.passages.length} passage{lec.passages.length !== 1 ? "s" : ""}</div>
                      </div>
                      <div className="flex gap-1">
                        <button className="text-xs text-slate-400 hover:text-slate-200 px-1.5 py-0.5 rounded hover:bg-slate-800"
                          onClick={e => { e.stopPropagation(); renameLecture(lec.id); }}>✏️</button>
                        <button className="text-xs text-red-400 hover:text-red-300 px-1.5 py-0.5 rounded hover:bg-slate-800"
                          onClick={e => { e.stopPropagation(); deleteLecture(lec.id); }}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="space-y-4">
              <h3 className="text-lg font-bold">{selectedLecture ? `Passages — ${selectedLecture.name}` : "Select a lecture"}</h3>
              {selectedLecture ? (
                <>
                  <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 space-y-3">
                    <label className="text-xs text-slate-400 font-medium">Add new passage</label>
                    <textarea value={newPassage} onChange={e => setNewPassage(e.target.value)} rows={4}
                      placeholder="Paste or type a passage from your lecture here..."
                      className="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 resize-none" />
                    <div className="flex justify-between items-center">
                      <span className="text-[10px] text-slate-500">{newPassage.length} characters</span>
                      <button onClick={addPassage}
                        className="px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-900 text-sm font-bold">
                        Add Passage
                      </button>
                    </div>
                  </div>
                  <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 max-h-80 overflow-auto space-y-2">
                    <h4 className="text-sm font-bold mb-2">Existing passages ({selectedLecture.passages.length})</h4>
                    {selectedLecture.passages.length === 0 ? (
                      <p className="text-xs text-slate-500 text-center py-4">No passages yet. Add some above.</p>
                    ) : selectedLecture.passages.map((p, idx) => (
                      <PassageEditor key={idx} index={idx} text={p} onChange={t => updatePassage(idx, t)} onDelete={() => deletePassage(idx)} />
                    ))}
                  </div>
                </>
              ) : <p className="text-sm text-slate-500">Select a lecture on the left to manage passages.</p>}
            </section>
          </div>
        </div>
      );
    }

    function PassageEditor({ index, text, onChange, onDelete }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(text);
      useEffect(() => setDraft(text), [text]);

      return (
        <div className="border border-slate-700/50 rounded-xl p-3 text-xs bg-slate-900/60 hover:border-slate-600 transition-all">
          <div className="flex justify-between items-center mb-1.5">
            <span className="text-slate-400 font-medium">Passage {index + 1} <span className="text-slate-600">({text.length} chars)</span></span>
            <div className="flex gap-1.5">
              {editing ? (
                <button className="text-emerald-400 hover:text-emerald-300 font-medium" onClick={() => { onChange(draft); setEditing(false); }}>Save</button>
              ) : (
                <button className="text-sky-400 hover:text-sky-300" onClick={() => setEditing(true)}>Edit</button>
              )}
              <button className="text-red-400 hover:text-red-300" onClick={onDelete}>Delete</button>
            </div>
          </div>
          {editing ? (
            <textarea value={draft} onChange={e => setDraft(e.target.value)} rows={3}
              className="w-full bg-slate-950 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-mono focus:outline-none focus:ring-1 focus:ring-sky-500 resize-none" />
          ) : (
            <p className="whitespace-pre-wrap text-slate-300 leading-relaxed">{text.length > 200 ? text.substring(0, 200) + "..." : text}</p>
          )}
        </div>
      );
    }

    /* ═══════════════════════ RACE SCREEN ═══════════════════════ */
    function RaceScreen({ config, onFinish }) {
      const { settings } = useContext(AppContext);
      const { passage, bots } = config;
      const [phase, setPhase] = useState("countdown"); // countdown | racing | finished
      const [countdown, setCountdown] = useState(3);
      const [input, setInput] = useState("");
      const [startTime, setStartTime] = useState(null);
      const [now, setNow] = useState(null);
      const [combo, setCombo] = useState(0);
      const [bestCombo, setBestCombo] = useState(0);
      const [comboFlash, setComboFlash] = useState(false);
      const inputRef = useRef(null);
      const passageRef = useRef(null);
      const currentCharRef = useRef(null);

      // Countdown
      useEffect(() => {
        if (phase !== "countdown") return;
        if (countdown <= 0) {
          setPhase("racing");
          if (settings.soundEnabled) playSound("go");
          setTimeout(() => inputRef.current?.focus(), 50);
          return;
        }
        if (settings.soundEnabled) playSound("countdown");
        const t = setTimeout(() => setCountdown(c => c - 1), 800);
        return () => clearTimeout(t);
      }, [phase, countdown]);

      // Timer tick
      useEffect(() => {
        if (phase !== "racing" || !startTime) return;
        const iv = setInterval(() => setNow(Date.now()), 80);
        return () => clearInterval(iv);
      }, [phase, startTime]);

      // ESC to restart
      useEffect(() => {
        const handler = (e) => {
          if (e.key === "Escape") { e.preventDefault(); setPhase("countdown"); setCountdown(3); setInput(""); setStartTime(null); setNow(null); setCombo(0); setBestCombo(0); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, []);

      // Auto-scroll
      useEffect(() => {
        if (currentCharRef.current && passageRef.current) {
          currentCharRef.current.scrollIntoView({ block: "center", inline: "nearest" });
        }
      }, [input.length]);

      const handleChange = (e) => {
        if (phase !== "racing") return;
        const val = e.target.value;
        if (!startTime && val.length > 0) { const t = Date.now(); setStartTime(t); setNow(t); }

        // Check combo for the new character
        const newCharIdx = val.length - 1;
        if (val.length > input.length && newCharIdx < passage.length) {
          if (normalizeChar(val[newCharIdx]) === normalizeChar(passage[newCharIdx])) {
            const newCombo = combo + 1;
            setCombo(newCombo);
            if (newCombo > bestCombo) setBestCombo(newCombo);
            if (newCombo > 0 && newCombo % 10 === 0) { setComboFlash(true); setTimeout(() => setComboFlash(false), 300); if (settings.soundEnabled) playSound("combo"); }
            if (settings.soundEnabled) playSound("keystroke");
          } else {
            setCombo(0);
            if (settings.soundEnabled) playSound("error");
          }
        }
        setInput(val);
      };

      const totalChars = passage.length;
      const typedChars = input.length;
      let correctChars = 0;
      for (let i = 0; i < typedChars && i < totalChars; i++) {
        if (normalizeChar(input[i]) === normalizeChar(passage[i])) correctChars++;
      }

      const elapsedMs = startTime && now ? Math.max(now - startTime, 1) : 1;
      const elapsedMins = elapsedMs / 60000;
      const wpm = correctChars > 0 ? (correctChars / 5) / elapsedMins : 0;
      const accuracy = typedChars > 0 ? (correctChars / typedChars) * 100 : 100;
      const progressFraction = totalChars ? Math.min(1, typedChars / totalChars) : 0;
      const elapsedSec = elapsedMs / 1000;

      // Finish detection
      useEffect(() => {
        if (phase === "racing" && typedChars >= totalChars && startTime) {
          setPhase("finished");
          setTimeout(() => onFinish({ wpm, accuracy, timeSec: elapsedSec, bestCombo }), 400);
        }
      }, [typedChars, totalChars, phase, startTime]);

      const botStates = bots.map(bot => {
        const charsPerSec = (bot.wpm * 5) / 60;
        const frac = Math.min(1, (charsPerSec * elapsedSec) / totalChars);
        return { ...bot, fraction: frac };
      });

      if (phase === "countdown") {
        return (
          <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
            <div className="text-8xl font-black animate-count-pop gradient-text" key={countdown}>
              {countdown > 0 ? countdown : "GO!"}
            </div>
            <p className="text-slate-400 mt-4 text-sm">Get ready to type...</p>
            <p className="text-slate-500 mt-2 text-xs">Press ESC to restart at any time</p>
          </div>
        );
      }

      return (
        <div className="space-y-4 animate-fade-in">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-bold flex items-center gap-2">
              Race!
              {combo >= 5 && settings.showCombo && (
                <span className={`text-sm font-mono px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-300 border border-amber-500/30 ${comboFlash ? 'combo-flash' : ''}`}>
                  {combo}x combo
                </span>
              )}
            </h2>
            <span className="text-xs text-slate-500">ESC to restart</span>
          </div>

          <div className="grid md:grid-cols-[2fr,1fr] gap-4">
            <div className="space-y-3">
              {/* Passage display */}
              <div className="glass-card-inner rounded-2xl p-4 border border-slate-800">
                <div ref={passageRef} className="font-mono text-lg md:text-xl leading-loose max-h-52 overflow-auto pr-2">
                  {passage.split("").map((ch, idx) => {
                    const typed = input[idx];
                    let cls = "passage-char ";
                    if (typed === undefined) cls += "text-slate-500";
                    else if (normalizeChar(typed) === normalizeChar(ch)) cls += "bg-emerald-500/30 text-emerald-200 rounded-sm";
                    else cls += "bg-red-500/40 text-red-200 rounded-sm";
                    if (idx === typedChars) cls += " border-l-2 border-emerald-400";
                    return <span key={idx} className={cls} ref={idx === typedChars ? currentCharRef : null}>{ch}</span>;
                  })}
                </div>
              </div>

              {/* Input */}
              <div className="glass-card-inner rounded-2xl p-4 border border-slate-800">
                <textarea ref={inputRef} value={input} onChange={handleChange} rows={3}
                  className="w-full bg-slate-900 rounded-xl border border-slate-700 px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500/50 resize-none"
                  placeholder="Start typing..." autoFocus={phase === "racing"} />
              </div>
            </div>

            <div className="space-y-3">
              {/* Live stats */}
              <div className="glass-card-inner rounded-2xl p-4 border border-slate-800">
                <h3 className="text-[10px] uppercase tracking-widest text-slate-500 mb-3 font-bold">Live Stats</h3>
                <div className="grid grid-cols-3 gap-2 text-center">
                  <div>
                    <div className="text-2xl font-bold font-mono text-emerald-400 neon-glow">{wpm.toFixed(0)}</div>
                    <div className="text-[10px] text-slate-400">WPM</div>
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-sky-400">{accuracy.toFixed(0)}%</div>
                    <div className="text-[10px] text-slate-400">Accuracy</div>
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-purple-400">{(progressFraction * 100).toFixed(0)}%</div>
                    <div className="text-[10px] text-slate-400">Progress</div>
                  </div>
                </div>
                <div className="text-[10px] text-slate-500 mt-3 text-center font-mono">
                  {elapsedSec.toFixed(1)}s — {typedChars}/{totalChars} chars
                </div>
              </div>

              {/* Race track */}
              <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 space-y-2.5">
                <h3 className="text-[10px] uppercase tracking-widest text-slate-500 mb-1 font-bold">Race Track</h3>
                <TrackRow label="You" emoji="🧠" fraction={progressFraction} color="bg-gradient-to-r from-emerald-400 to-cyan-400" isPlayer />
                {botStates.map(bot => (
                  <TrackRow key={bot.name} label={bot.name} emoji={bot.emoji} fraction={bot.fraction} color={bot.color} />
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TrackRow({ label, emoji, fraction, color, isPlayer }) {
      return (
        <div className="text-xs">
          <div className="flex justify-between mb-1">
            <span className={`flex items-center gap-1.5 ${isPlayer ? "font-bold text-emerald-300" : "text-slate-300"}`}>
              <span>{emoji}</span> {label}
            </span>
            <span className="text-slate-500 font-mono">{(fraction * 100).toFixed(0)}%</span>
          </div>
          <div className="h-2.5 rounded-full bg-slate-800 overflow-hidden">
            <div className={`h-full rounded-full ${color} transition-all duration-150`}
              style={{ width: `${Math.max(fraction * 100, 1)}%` }} />
          </div>
        </div>
      );
    }

    /* ═══════════════════════ RESULTS SCREEN ═══════════════════════ */
    function ResultsScreen({ result, onBackToMenu, onRaceAgain, races }) {
      useEffect(() => {
        const handler = (e) => { if (e.key === "Enter") { e.preventDefault(); onRaceAgain?.(); } };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [onRaceAgain]);

      const wpmRating = result.wpm >= 80 ? "Incredible!" : result.wpm >= 60 ? "Great!" : result.wpm >= 40 ? "Good job!" : "Keep practicing!";
      const accRating = result.accuracy >= 98 ? "Flawless!" : result.accuracy >= 95 ? "Very accurate!" : result.accuracy >= 90 ? "Solid!" : "Work on accuracy";

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="text-center py-4">
            <div className="text-5xl mb-3">🏆</div>
            <h2 className="text-3xl font-black gradient-text">Race Complete!</h2>
            <p className="text-slate-400 text-sm mt-1">{wpmRating}</p>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 text-center">
              <div className="text-3xl font-black font-mono text-emerald-400 neon-glow">{result.wpm.toFixed(1)}</div>
              <div className="text-xs text-slate-400 mt-1">Words per Minute</div>
            </div>
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 text-center">
              <div className="text-3xl font-black font-mono text-sky-400">{result.accuracy.toFixed(1)}%</div>
              <div className="text-xs text-slate-400 mt-1">Accuracy — {accRating}</div>
            </div>
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 text-center">
              <div className="text-3xl font-black font-mono text-purple-400">{result.timeSec.toFixed(1)}s</div>
              <div className="text-xs text-slate-400 mt-1">Time</div>
            </div>
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 text-center">
              <div className="text-3xl font-black font-mono text-amber-400">{result.bestCombo || 0}x</div>
              <div className="text-xs text-slate-400 mt-1">Best Combo</div>
            </div>
          </div>

          <div className="flex flex-col sm:flex-row gap-3 justify-center pt-2">
            <button onClick={onRaceAgain}
              className="px-8 py-3 rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-900 font-bold shadow-lg shadow-emerald-500/25 hover:shadow-xl transition-all active:scale-[0.97]">
              Race Again (Enter)
            </button>
            <button onClick={onBackToMenu}
              className="px-8 py-3 rounded-2xl glass-card border border-slate-700 hover:border-slate-600 font-medium transition-all">
              Back to Menu
            </button>
          </div>

          <p className="text-center text-xs text-slate-500">
            Tip: Adjust difficulty in settings or manage your lecture passages for targeted review.
          </p>
        </div>
      );
    }

    /* ═══════════════════════ STATS SCREEN ═══════════════════════ */
    function StatsScreen() {
      const { races } = useContext(AppContext);
      const stats = getStats(races);
      const avgWpm = calculateAvgWPM(races);
      const avgAcc = races.length ? races.reduce((a, r) => a + r.accuracy, 0) / races.length : 0;
      const totalTime = races.reduce((a, r) => a + (r.timeSec || 0), 0);

      // WPM over time for mini chart
      const chartData = races.slice(-30);
      const maxWpm = Math.max(...chartData.map(r => r.wpm), 1);

      return (
        <div className="space-y-6 animate-fade-in">
          <h2 className="text-2xl font-bold flex items-center gap-2">📊 Statistics</h2>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <StatCard label="Total Races" value={stats.totalRaces} icon="🏁" color="sky" />
            <StatCard label="Best WPM" value={stats.bestWpm.toFixed(0)} icon="⚡" color="emerald" />
            <StatCard label="Avg WPM" value={avgWpm.toFixed(0)} icon="📈" color="cyan" />
            <StatCard label="Avg Accuracy" value={`${avgAcc.toFixed(1)}%`} icon="🎯" color="purple" />
            <StatCard label="Perfect Races" value={stats.perfectRaces} icon="💯" color="amber" />
            <StatCard label="Streak" value={`${stats.streak}d`} icon="🔥" color="rose" />
            <StatCard label="Best Combo" value={`${stats.bestCombo}x`} icon="👑" color="yellow" />
            <StatCard label="Total Time" value={`${(totalTime / 60).toFixed(0)}m`} icon="⏱️" color="slate" />
          </div>

          {/* Mini WPM chart */}
          {chartData.length > 1 && (
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800">
              <h3 className="text-sm font-bold mb-3">WPM Trend (Last {chartData.length} races)</h3>
              <div className="flex items-end gap-1 h-32">
                {chartData.map((r, i) => {
                  const h = (r.wpm / maxWpm) * 100;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end group relative">
                      <div className="absolute -top-6 bg-slate-800 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity font-mono whitespace-nowrap z-10">
                        {r.wpm.toFixed(0)} WPM
                      </div>
                      <div className="w-full rounded-t bg-gradient-to-t from-emerald-500 to-cyan-400 transition-all hover:from-emerald-400 hover:to-cyan-300"
                        style={{ height: `${Math.max(h, 4)}%` }} />
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Race history table */}
          {races.length > 0 && (
            <div className="glass-card-inner rounded-2xl p-4 border border-slate-800">
              <h3 className="text-sm font-bold mb-3">Race History</h3>
              <div className="max-h-64 overflow-auto">
                <table className="w-full text-xs">
                  <thead><tr className="text-slate-400 border-b border-slate-700">
                    <th className="py-2 text-left">#</th><th className="py-2 text-left">Date</th>
                    <th className="py-2 text-right">WPM</th><th className="py-2 text-right">Accuracy</th>
                    <th className="py-2 text-right">Mode</th>
                  </tr></thead>
                  <tbody>
                    {[...races].reverse().map((r, i) => (
                      <tr key={r.id} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                        <td className="py-1.5 text-slate-500">{races.length - i}</td>
                        <td className="py-1.5 text-slate-400">{new Date(r.timestamp).toLocaleDateString()}</td>
                        <td className="py-1.5 text-right font-mono text-emerald-400">{r.wpm.toFixed(1)}</td>
                        <td className="py-1.5 text-right font-mono text-sky-400">{r.accuracy.toFixed(1)}%</td>
                        <td className="py-1.5 text-right text-slate-400 capitalize">{r.mode}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════ ACHIEVEMENTS SCREEN ═══════════════════════ */
    function AchievementsScreen() {
      const { races, achievements } = useContext(AppContext);
      const stats = getStats(races);

      return (
        <div className="space-y-6 animate-fade-in">
          <h2 className="text-2xl font-bold flex items-center gap-2">🏆 Achievements</h2>
          <p className="text-sm text-slate-400">{achievements.length} of {ACHIEVEMENTS_LIST.length} unlocked</p>

          <div className="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
            <div className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full transition-all"
              style={{ width: `${(achievements.length / ACHIEVEMENTS_LIST.length) * 100}%` }} />
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            {ACHIEVEMENTS_LIST.map(a => {
              const unlocked = achievements.includes(a.id);
              return (
                <div key={a.id}
                  className={`rounded-2xl p-4 border transition-all ${unlocked
                    ? "glass-card-inner border-emerald-500/30 bg-emerald-500/5"
                    : "glass-card-inner border-slate-800 opacity-50"}`}>
                  <div className="flex items-center gap-3">
                    <div className={`text-3xl ${unlocked ? "" : "grayscale"}`}>{a.icon}</div>
                    <div>
                      <div className={`text-sm font-bold ${unlocked ? "text-emerald-300" : "text-slate-400"}`}>{a.name}</div>
                      <div className="text-[10px] text-slate-400">{a.desc}</div>
                    </div>
                  </div>
                  {unlocked && <div className="text-[9px] text-emerald-500 mt-2 font-medium">UNLOCKED</div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ═══════════════════════ SETTINGS SCREEN ═══════════════════════ */
    function SettingsScreen() {
      const { settings, updateSetting, lectures, races, setLectures, setRaces } = useContext(AppContext);
      const fileInputRef = useRef(null);

      return (
        <div className="space-y-6 animate-fade-in max-w-2xl mx-auto">
          <h2 className="text-2xl font-bold flex items-center gap-2">⚙️ Settings</h2>

          <div className="space-y-4">
            <SettingRow label="Theme" desc="Choose your visual preference">
              <select value={settings.theme} onChange={e => updateSetting("theme", e.target.value)}
                className="px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </SettingRow>

            <SettingRow label="Difficulty" desc="Controls passage length and bot speed">
              <select value={settings.difficulty} onChange={e => updateSetting("difficulty", e.target.value)}
                className="px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </SettingRow>

            <SettingRow label="Sound Effects" desc="Keystroke and event sounds">
              <button onClick={() => updateSetting("soundEnabled", !settings.soundEnabled)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${settings.soundEnabled ? "bg-emerald-500/20 text-emerald-300 border border-emerald-500/30" : "glass-card-inner border border-slate-700 text-slate-400"}`}>
                {settings.soundEnabled ? "On" : "Off"}
              </button>
            </SettingRow>

            <SettingRow label="Combo Display" desc="Show combo streak during races">
              <button onClick={() => updateSetting("showCombo", !settings.showCombo)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${settings.showCombo ? "bg-emerald-500/20 text-emerald-300 border border-emerald-500/30" : "glass-card-inner border border-slate-700 text-slate-400"}`}>
                {settings.showCombo ? "On" : "Off"}
              </button>
            </SettingRow>
          </div>

          <hr className="border-slate-800" />

          <div className="space-y-3">
            <h3 className="text-lg font-bold">Data Management</h3>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => exportData()}
                className="px-4 py-2 rounded-xl glass-card border border-slate-700 text-sm hover:border-slate-600 transition-all">
                📤 Export All Data
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="px-4 py-2 rounded-xl glass-card border border-slate-700 text-sm hover:border-slate-600 transition-all">
                📥 Import Data
              </button>
              <input ref={fileInputRef} type="file" accept=".json" className="hidden"
                onChange={e => importData(e, setLectures, setRaces)} />
              <button onClick={() => { if (confirm("This will delete ALL your data. Are you sure?")) { setLectures([]); setRaces([]); localStorage.clear(); } }}
                className="px-4 py-2 rounded-xl border border-red-500/30 text-red-400 text-sm hover:bg-red-500/10 transition-all">
                🗑️ Clear All Data
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SettingRow({ label, desc, children }) {
      return (
        <div className="glass-card-inner rounded-2xl p-4 border border-slate-800 flex items-center justify-between">
          <div>
            <div className="text-sm font-medium">{label}</div>
            <div className="text-[10px] text-slate-400">{desc}</div>
          </div>
          {children}
        </div>
      );
    }

    /* ═══════════════════════ EXPORT / IMPORT ═══════════════════════ */
    function exportData() {
      const data = {
        version: 2,
        exportDate: new Date().toISOString(),
        lectures: load(LECTURES_KEY, []),
        races: load(RACES_KEY, []),
        settings: load(SETTINGS_KEY, DEFAULT_SETTINGS),
        achievements: load(ACHIEVEMENTS_KEY, []),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `neurotyper-backup-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(e, setLectures, setRaces) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.lectures) { save(LECTURES_KEY, data.lectures); setLectures(data.lectures); }
          if (data.races) { save(RACES_KEY, data.races); setRaces(data.races); }
          if (data.settings) save(SETTINGS_KEY, data.settings);
          if (data.achievements) save(ACHIEVEMENTS_KEY, data.achievements);
          alert("Data imported successfully! Refreshing...");
          location.reload();
        } catch (err) { alert("Failed to import: invalid file format."); }
      };
      reader.readAsText(file);
    }

    /* ═══════════════════════ MOUNT ═══════════════════════ */
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
